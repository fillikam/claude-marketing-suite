<svg width="720" height="460" viewBox="0 0 720 460" xmlns="http://www.w3.org/2000/svg" style="background:#fff;border-radius:16px;">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#aaa"/>
    </marker>
  </defs>

  <!-- arrows -->
  <!-- report -> audit -->
  <line x1="295" y1="65" x2="175" y2="143" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- report -> landing -->
  <line x1="360" y1="70" x2="360" y2="143" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- report -> competitors -->
  <line x1="425" y1="65" x2="545" y2="143" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- audit -> brand -->
  <line x1="175" y1="195" x2="265" y2="243" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- landing -> brand -->
  <line x1="340" y1="195" x2="295" y2="243" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- landing -> audience -->
  <line x1="380" y1="195" x2="425" y2="243" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- competitors -> audience -->
  <line x1="545" y1="195" x2="455" y2="243" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- brand -> emails -->
  <line x1="260" y1="295" x2="170" y2="343" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- brand -> social -->
  <line x1="285" y1="295" x2="330" y2="343" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- audience -> social -->
  <line x1="435" y1="295" x2="390" y2="343" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- audience -> ads -->
  <line x1="460" y1="295" x2="545" y2="343" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- social -> headlines -->
  <line x1="360" y1="395" x2="360" y2="423" stroke="#aaa" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- /aim report -->
  <rect x="270" y="20" width="180" height="46" rx="10" fill="#e8e6f5" stroke="#c5c0e8" stroke-width="1.5"/>
  <text x="360" y="48" text-anchor="middle" font-family="monospace" font-size="16" fill="#444">/aim report</text>

  <!-- /aim audit -->
  <rect x="85" y="148" width="175" height="46" rx="10" fill="#d6eeea" stroke="#a8d8d2" stroke-width="1.5"/>
  <text x="172" y="176" text-anchor="middle" font-family="monospace" font-size="16" fill="#444">/aim audit</text>

  <!-- /aim landing -->
  <rect x="272" y="148" width="175" height="46" rx="10" fill="#d6eeea" stroke="#a8d8d2" stroke-width="1.5"/>
  <text x="360" y="176" text-anchor="middle" font-family="monospace" font-size="16" fill="#444">/aim landing</text>

  <!-- /aim competitors -->
  <rect x="458" y="148" width="185" height="46" rx="10" fill="#d6eeea" stroke="#a8d8d2" stroke-width="1.5"/>
  <text x="550" y="176" text-anchor="middle" font-family="monospace" font-size="16" fill="#444">/aim competitors</text>

  <!-- /aim brand -->
  <rect x="180" y="248" width="160" height="46" rx="10" fill="#f5ddd9" stroke="#e8bbb5" stroke-width="1.5"/>
  <text x="260" y="276" text-anchor="middle" font-family="monospace" font-size="16" fill="#444">/aim brand</text>

  <!-- /aim audience -->
  <rect x="365" y="248" width="175" height="46" rx="10" fill="#f5ddd9" stroke="#e8bbb5" stroke-width="1.5"/>
  <text x="452" y="276" text-anchor="middle" font-family="monospace" font-size="16" fill="#444">/aim audience</text>

  <!-- /aim emails -->
  <rect x="75" y="348" width="165" height="46" rx="10" fill="#f5ecd6" stroke="#e8d5a8" stroke-width="1.5"/>
  <text x="157" y="376" text-anchor="middle" font-family="monospace" font-size="16" fill="#444">/aim emails</text>

  <!-- /aim social -->
  <rect x="272" y="348" width="165" height="46" rx="10" fill="#f5ecd6" stroke="#e8d5a8" stroke-width="1.5"/>
  <text x="355" y="376" text-anchor="middle" font-family="monospace" font-size="16" fill="#444">/aim social</text>

  <!-- /aim ads -->
  <rect x="468" y="348" width="140" height="46" rx="10" fill="#f5ecd6" stroke="#e8d5a8" stroke-width="1.5"/>
  <text x="538" y="376" text-anchor="middle" font-family="monospace" font-size="16" fill="#444">/aim ads</text>

  <!-- /aim headlines -->
  <rect x="265" y="423" width="190" height="46" rx="10" fill="#d6e8f5" stroke="#a8c8e8" stroke-width="1.5"/>
  <text x="360" y="451" text-anchor="middle" font-family="monospace" font-size="16" fill="#444">/aim headlines</text>
</svg>